<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元宵猜灯谜</title>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
    <div class="night-sky">
        <div class="stars"></div>
        <div class="moon"></div>
    </div>

    <div class="container">
        <h1 class="festival-title">
            <span class="title-simon">元宵</span>
            <span class="title-greeting"> 猜灯谜</span>
        </h1>

        <p class="game-instruction">点击灯笼获取灯谜，点击汤圆查看谜底</p>

        <div class="lanterns-container">
            <div class="lantern-row first-row">
                <div class="lantern">
                    <div class="lantern-body"></div>
                    <div class="lantern-fringe"></div>
                </div>
                <div class="lantern">
                    <div class="lantern-body"></div>
                    <div class="lantern-fringe"></div>
                </div>
                <div class="lantern">
                    <div class="lantern-body"></div>
                    <div class="lantern-fringe"></div>
                </div>
                <div class="lantern">
                    <div class="lantern-body"></div>
                    <div class="lantern-fringe"></div>
                </div>
            </div>

            <div class="lantern-row second-row">
                <div class="lantern">
                    <div class="lantern-body"></div>
                    <div class="lantern-fringe"></div>
                </div>
                <div class="lantern">
                    <div class="lantern-body"></div>
                    <div class="lantern-fringe"></div>
                </div>
                <div class="lantern">
                    <div class="lantern-body"></div>
                    <div class="lantern-fringe"></div>
                </div>
                <div class="lantern">
                    <div class="lantern-body"></div>
                    <div class="lantern-fringe"></div>
                </div>
            </div>
        </div>

        <div class="tangyuan-bowl">
            <div class="bowl">
                <div class="tangyuan tangyuan-1"></div>
                <div class="tangyuan tangyuan-2"></div>
                <div class="tangyuan tangyuan-3"></div>
                <div class="tangyuan tangyuan-4"></div>
                <div class="tangyuan tangyuan-5"></div>
                <div class="steam steam-1"></div>
                <div class="steam steam-2"></div>
                <div class="steam steam-3"></div>
            </div>
            <p class="bowl-text">元宵佳节 团团圆圆</p>
        </div>
    </div>

    <script src="js/script.js?v=2"></script>
</body>
</html>
