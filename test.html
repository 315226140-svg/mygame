<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
</head>
<body>
    <h1>JavaScript测试页面</h1>
    <button id="test-btn">点击测试</button>
    <p id="result">等待点击...</p>

    <script>
        console.log('测试页面加载成功');

        document.getElementById('test-btn').addEventListener('click', function() {
            console.log('按钮被点击了！');
            document.getElementById('result').textContent = '按钮点击成功！';
            alert('JavaScript工作正常！');
        });

        console.log('事件监听器已添加');
    </script>
</body>
</html>
